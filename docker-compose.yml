services:
  freellmapi:
    build: ../freellmapi
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      ENCRYPTION_KEY: ${FREELLMAPI_ENCRYPTION_KEY:-}
    volumes:
      - freellmapi-data:/app/server/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      PARSER_BACKEND: ${PARSER_BACKEND:-tesseract}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      FREELLMAPI_BASE_URL: ${FREELLMAPI_BASE_URL:-http://freellmapi:3001}
      FREELLMAPI_API_KEY: ${FREELLMAPI_API_KEY:-}
      FREELLMAPI_MODEL: ${FREELLMAPI_MODEL:-auto}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-20971520}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DB_PATH: /data/bills.db
      UPLOADS_DIR: /data/uploads
    volumes:
      - backend-data:/data
    depends_on:
      - freellmapi

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  backend-data:
  freellmapi-data:
